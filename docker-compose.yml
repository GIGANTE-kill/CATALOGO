services:
  catalogodsr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catalogodsr-app
    restart: always
    command: npm run dev -- --host 0.0.0.0 --port 8106
    ports:
      - "8106:8106"
    environment:
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://10.122.83.135:8106}
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - Servidores

networks:
  Servidores:
    external: true
